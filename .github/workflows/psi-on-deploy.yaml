name: PSI on Deploy

on:
  push:
    branches: [main]

jobs:
  psi:
    runs-on: ubuntu-latest
    env:
      AEM_ORG: ${{ vars.AEM_ORG }}
      AEM_SITE: ${{ vars.AEM_SITE }}
    steps:
      - name: Check if PSI monitoring is enabled
        id: check
        run: |
          CONFIG=$(curl -sf "https://main--${AEM_SITE}--${AEM_ORG}.aem.live/config.json" || echo '{}')
          ENABLED=$(echo "$CONFIG" | jq -r '.psi.enabled // false')
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"
          [ "$ENABLED" = "true" ] && echo "PSI monitoring is enabled." || echo "PSI monitoring is not enabled. Skipping."

      - name: Wait for code sync
        if: steps.check.outputs.enabled == 'true'
        run: sleep 60

      - uses: actions/checkout@v5
        if: steps.check.outputs.enabled == 'true'

      - name: Run Lighthouse
        if: steps.check.outputs.enabled == 'true'
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: "https://main--$AEM_SITE--$AEM_ORG.aem.live/"
          runs: 1

      - name: Write scores to public config
        if: steps.check.outputs.enabled == 'true' && steps.lighthouse.outputs.manifest != ''
        run: |
          MANIFEST='${{ steps.lighthouse.outputs.manifest }}'
          PERF=$(echo "$MANIFEST" | jq '.[0].summary.performance * 100 | round')
          A11Y=$(echo "$MANIFEST" | jq '.[0].summary.accessibility * 100 | round')
          BP=$(echo "$MANIFEST" | jq '.[0].summary["best-practices"] * 100 | round')
          SEO=$(echo "$MANIFEST" | jq '.[0].summary.seo * 100 | round')

          echo "Performance: $PERF | Accessibility: $A11Y | Best Practices: $BP | SEO: $SEO"

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PAYLOAD=$(jq -n \
            --argjson perf "$PERF" --argjson a11y "$A11Y" \
            --argjson bp "$BP" --argjson seo "$SEO" \
            --arg lastRun "$NOW" \
            '{ psi: { enabled: true, lastRun: $lastRun, scores: { performance: $perf, accessibility: $a11y, "best-practices": $bp, seo: $seo } } }')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://admin.hlx.page/config/${AEM_ORG}/sites/${AEM_SITE}/public.json" \
            -H "content-type: application/json" \
            -H "x-auth-token: ${{ secrets.AEM_ADMIN_API_KEY }}" \
            --data "$PAYLOAD")

          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] \
            && echo "Scores saved (HTTP $HTTP_CODE)" \
            || echo "::warning::Failed to save scores (HTTP $HTTP_CODE)"
