name: PSI on Deploy

on:
  push:
    branches: [main]

jobs:
  psi:
    runs-on: ubuntu-latest
    steps:
      - name: Check if PSI monitoring is enabled
        id: check
        run: |
          CONFIG=$(curl -sf "https://main--da-playground--usman-khalid.aem.live/config.json" || echo '{}')
          ENABLED=$(echo "$CONFIG" | jq -r '.public.psi.enabled // false')
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"
          [ "$ENABLED" = "true" ] && echo "PSI monitoring is enabled." || echo "PSI monitoring is not enabled. Skipping."

      - name: Wait for code sync
        if: steps.check.outputs.enabled == 'true'
        run: sleep 30

      - name: Run PageSpeed Insights
        if: steps.check.outputs.enabled == 'true'
        id: psi
        run: |
          SITE_URL="https://main--da-playground--usman-khalid.aem.live/"
          ENCODED_URL=$(printf '%s' "$SITE_URL" | jq -sRr @uri)
          echo "Testing: $SITE_URL"

          RESPONSE=$(curl -sL -w "\n%{http_code}" \
            -H "x-auth-token: ${{ secrets.AEM_ADMIN_API_KEY }}" \
            "https://admin.hlx.page/psi/usman-khalid/da-playground/main?url=${ENCODED_URL}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          RESULT=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::PSI request failed (HTTP $HTTP_CODE): $RESULT"
            exit 1
          fi

          PERF=$(echo "$RESULT" | jq '.lighthouseResult.categories.performance.score // empty | . * 100 | round')
          A11Y=$(echo "$RESULT" | jq '.lighthouseResult.categories.accessibility.score // empty | . * 100 | round')
          BP=$(echo "$RESULT" | jq '.lighthouseResult.categories["best-practices"].score // empty | . * 100 | round')
          SEO=$(echo "$RESULT" | jq '.lighthouseResult.categories.seo.score // empty | . * 100 | round')

          echo "Performance: $PERF | Accessibility: $A11Y | Best Practices: $BP | SEO: $SEO"

          if [ -z "$PERF" ] && [ -z "$A11Y" ] && [ -z "$BP" ] && [ -z "$SEO" ]; then
            echo "error=true" >> "$GITHUB_OUTPUT"
          else
            echo "perf=${PERF:-0}" >> "$GITHUB_OUTPUT"
            echo "a11y=${A11Y:-0}" >> "$GITHUB_OUTPUT"
            echo "bp=${BP:-0}" >> "$GITHUB_OUTPUT"
            echo "seo=${SEO:-0}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write error to public config
        if: steps.check.outputs.enabled == 'true' && steps.psi.outputs.error == 'true'
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOW_MS=$(date -u +%s)000
          CONFIG=$(curl -sf "https://main--da-playground--usman-khalid.aem.live/config.json" || echo '{}')
          PREV_HISTORY=$(echo "$CONFIG" | jq '.public.psi.history // []')

          PAYLOAD=$(jq -n \
            --arg lastRun "$NOW" \
            --argjson history "$PREV_HISTORY" \
            '{ psi: { enabled: true, lastRun: $lastRun, error: "Lighthouse returned no scores", history: $history } }')

          curl -sL -o /dev/null \
            -X POST "https://admin.hlx.page/config/usman-khalid/sites/da-playground/public.json" \
            -H "content-type: application/json" \
            -H "x-auth-token: ${{ secrets.AEM_ADMIN_API_KEY }}" \
            --data "$PAYLOAD"
          echo "::warning::Lighthouse returned no scores. Error saved to public config."

      - name: Write scores to public config
        if: steps.check.outputs.enabled == 'true' && steps.psi.outputs.error != 'true'
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOW_MS=$(date -u +%s)000
          CONFIG=$(curl -sf "https://main--da-playground--usman-khalid.aem.live/config.json" || echo '{}')
          PREV_HISTORY=$(echo "$CONFIG" | jq '.public.psi.history // []')

          NEW_ENTRY=$(jq -n \
            --argjson ts "$NOW_MS" \
            --argjson perf "${{ steps.psi.outputs.perf }}" \
            --argjson a11y "${{ steps.psi.outputs.a11y }}" \
            --argjson bp "${{ steps.psi.outputs.bp }}" \
            --argjson seo "${{ steps.psi.outputs.seo }}" \
            '{ timestamp: $ts, scores: { performance: $perf, accessibility: $a11y, "best-practices": $bp, seo: $seo } }')

          HISTORY=$(echo "$PREV_HISTORY" | jq --argjson entry "$NEW_ENTRY" '[$entry] + . | .[0:20]')

          PAYLOAD=$(jq -n \
            --argjson perf "${{ steps.psi.outputs.perf }}" \
            --argjson a11y "${{ steps.psi.outputs.a11y }}" \
            --argjson bp "${{ steps.psi.outputs.bp }}" \
            --argjson seo "${{ steps.psi.outputs.seo }}" \
            --arg lastRun "$NOW" \
            --argjson history "$HISTORY" \
            '{ psi: { enabled: true, lastRun: $lastRun, error: null, scores: { performance: $perf, accessibility: $a11y, "best-practices": $bp, seo: $seo }, history: $history } }')

          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" \
            -X POST "https://admin.hlx.page/config/usman-khalid/sites/da-playground/public.json" \
            -H "content-type: application/json" \
            -H "x-auth-token: ${{ secrets.AEM_ADMIN_API_KEY }}" \
            --data "$PAYLOAD")

          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] \
            && echo "Scores saved (HTTP $HTTP_CODE)" \
            || echo "::warning::Failed to save scores (HTTP $HTTP_CODE)"
